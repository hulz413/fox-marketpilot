schema: spec-driven

context: |
  项目是 MarketPilot，一个面向国内中文演示场景的商机顾问 Agent。
  Change 命名使用英文动作 + 名词风格，例如 create-research-task。
  所有数据库表默认包含数据库内部自增 id、created_at、updated_at 和 deleted_at 字段。
  对外暴露或跨模块关联需要稳定标识时，另行使用 uuid 等公开标识字段，避免暴露内部自增 id。

rules:
  proposal:
    - 聚焦单个垂直业务切片，避免把多个 Change 混在一个 proposal 中。
    - 明确用户价值、范围和非目标。
    - 产品需求描述不要混入不必要的实现细节。
  design:
    - 涉及数据库表设计时，必须显式说明如何遵循数据库通用字段规范。
    - 涉及软删除数据读取时，默认只返回 deleted_at 为空的记录，除非 change 明确要求包含已删除记录。
  specs:
    - 使用可验证的 requirement 和 scenario。
    - 对用户可见文案默认中文，并考虑中英文 UI 切换。
    - 涉及 Agent、RAG 或异步任务时必须覆盖 tracing、logging 或 metrics 影响。
  tasks:
    - 按可交付的实现步骤拆分任务。
    - 包含必要的测试、线上演示验证和可观测性验证。
